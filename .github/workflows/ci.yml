name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Force the bundled JS actions onto Node 24 (they still ship a Node 20 runtime,
# which GitHub deprecates). Tag-agnostic — no need to chase action major versions.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend install
        working-directory: frontend
        run: npm ci

      - name: Frontend build
        working-directory: frontend
        run: npm run build

      - name: Frontend unit tests
        working-directory: frontend
        run: npm test

      - name: Install Playwright browsers
        if: runner.os != 'Linux'
        working-directory: frontend
        run: npx playwright install chromium

      - name: Install Playwright browsers and Linux dependencies
        if: runner.os == 'Linux'
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Frontend smoke tests
        working-directory: frontend
        run: npm run test:e2e

      - name: Go tests
        run: go test -race ./...
